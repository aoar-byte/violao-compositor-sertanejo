<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎸 Violão Compositor Sertanejo Pro v2.2.0</title>
    <style>
        :root {
            --bg: #0a0a14;
            --panel: #111128;
            --card: #1a1a3a;
            --border: #2a2a50;
            --accent: #667eea;
            --accent2: #27ae60;
            --accent3: #f39c12;
            --danger: #e74c3c;
            --text: #e0e0e0;
            --text2: #888;
            --grid-line: #1e1e40;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        .header {
            background: var(--panel);
            border-bottom: 2px solid var(--border);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }
        .header .logo { font-size: 16px; font-weight: 800; color: var(--accent); }
        .header .logo span { color: var(--accent2); }
        .header .status { font-size: 10px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--danger); transition: background 0.3s; }
        .status-dot.online { background: var(--accent2); }

        .main-layout { display: flex; flex: 1; overflow: hidden; }

        .panel-esquerdo {
            width: 260px; min-width: 260px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            overflow-y: auto;
        }
        .panel-titulo {
            font-size: 10px; font-weight: 700; color: var(--text2);
            text-transform: uppercase; letter-spacing: 1px; padding: 8px 12px 4px;
        }

        .cat-nome {
            font-size: 11px; font-weight: 700; color: var(--accent);
            padding: 6px 12px; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
        }
        .cat-nome::before { content: '▸'; font-size: 8px; transition: transform 0.2s; }
        .cat-nome.aberto::before { transform: rotate(90deg); }
        .cat-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 3px; padding: 0 8px;
            max-height: 0; overflow: hidden; transition: max-height 0.3s;
        }
        .cat-nome.aberto + .cat-grid { max-height: 400px; padding: 4px 8px; }

        .acorde-chip {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 5px; padding: 6px 3px; text-align: center;
            font-size: 10px; font-weight: 700; cursor: pointer;
            transition: all 0.15s; white-space: nowrap;
        }
        .acorde-chip:hover { background: var(--accent); color: white; transform: scale(1.05); }
        .acorde-chip.selecionado { background: var(--accent2); color: white; border-color: var(--accent2); }
        .acorde-chip.custom { border-style: dashed; border-color: var(--accent3); }
        .acorde-chip.sugestao { border-color: var(--accent3); box-shadow: 0 0 8px rgba(243,156,18,0.4); }

        .editor-custom { padding: 8px 12px; }
        .editor-custom input[type="text"] {
            width: 100%; padding: 6px 8px; border-radius: 5px;
            border: 1px solid var(--border); background: var(--card); color: var(--text);
            font-size: 11px; margin-bottom: 6px;
        }
        .corda-row {
            display: flex; align-items: center; gap: 4px; margin-bottom: 3px;
        }
        .corda-row span { font-size: 8px; color: #c9a87c; width: 45px; text-align: right; }
        .corda-row input {
            width: 35px; padding: 3px; text-align: center;
            border-radius: 4px; border: 1px solid var(--border);
            background: var(--card); color: var(--text); font-size: 10px;
        }
        .corda-row .preview { font-size: 8px; color: var(--accent); min-width: 25px; }

        .piano-container { flex: 1; display: flex; flex-direction: column; background: var(--bg); }

        .toolbar {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 12px; background: var(--panel);
            border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
        }
        .btn {
            padding: 5px 10px; border-radius: 5px; border: 1px solid var(--border);
            background: var(--card); color: var(--text); cursor: pointer;
            font-size: 10px; font-weight: 600; transition: all 0.2s; white-space: nowrap;
        }
        .btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .btn.ativo { background: var(--accent2); color: white; }
        .btn.play { background: var(--accent2); color: white; font-size: 13px; padding: 5px 14px; }
        .btn.stop { background: var(--danger); color: white; }
        .btn.export { background: var(--accent3); color: #000; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .bpm-box {
            display: flex; align-items: center; gap: 4px;
            font-size: 10px; color: var(--text2); font-weight: 700;
        }
        .bpm-box input {
            width: 45px; padding: 4px; text-align: center;
            border-radius: 4px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); font-weight: 700; font-size: 11px;
        }

        .piano-grid {
            flex: 1; overflow-y: auto; overflow-x: auto; position: relative;
        }
        .piano-inner { display: flex; min-height: 100%; }

        .piano-keys {
            width: 55px; flex-shrink: 0; position: sticky; left: 0; z-index: 2;
            background: var(--panel);
        }
        .piano-key {
            height: 26px; display: flex; align-items: center; justify-content: flex-end;
            padding-right: 5px; font-size: 8px; font-weight: 700;
            border-bottom: 1px solid var(--border); cursor: pointer;
            transition: background 0.1s;
        }
        .piano-key.white { background: #e8e8d8; color: #333; }
        .piano-key.black { background: #333; color: #ccc; height: 17px; font-size: 7px; }
        .piano-key.playing { background: var(--accent) !important; color: white !important; }

        .acordes-grade { flex: 1; position: relative; min-width: 800px; }
        .grade-linha {
            height: 26px; border-bottom: 1px solid var(--grid-line); position: relative;
        }
        .grade-linha.black { height: 17px; background: rgba(0,0,0,0.15); }

        .bloco-acorde {
            position: absolute; height: 24px; top: 1px;
            background: var(--accent); border-radius: 4px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 700; color: white;
            min-width: 40px; transition: filter 0.15s, box-shadow 0.15s; z-index: 1;
        }
        .bloco-acorde:hover { filter: brightness(1.2); z-index: 3; }
        .bloco-acorde.ativo { box-shadow: 0 0 14px var(--accent2); z-index: 2; }

        .cursor-play {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background: var(--accent2); z-index: 4; pointer-events: none;
            display: none;
        }

        .console {
            height: 100px; background: #050510; border-top: 1px solid var(--border);
            padding: 8px 12px; overflow-y: auto;
            font-family: 'Courier New', monospace; font-size: 9px;
            flex-shrink: 0;
        }
        .console .ok { color: #27ae60; }
        .console .warn { color: #f39c12; }
        .console .erro { color: #e74c3c; }
        .console .info { color: #3498db; }

        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); display: flex;
            align-items: center; justify-content: center; z-index: 100;
        }
        .modal.hidden { display: none; }
        .modal-box {
            background: var(--panel); border-radius: 14px; padding: 25px;
            text-align: center; border: 2px dashed var(--accent); max-width: 450px;
        }
        .modal-box h3 { color: var(--accent); margin-bottom: 10px; }
        .modal-progress {
            height: 6px; background: var(--border); border-radius: 3px;
            margin-top: 12px; overflow: hidden; display: none;
        }
        .modal-progress-fill { height: 100%; background: var(--accent2); width: 0%; transition: width 0.3s; }

        /* ==================== MINI-BRAÇO CIFRACLUB ==================== */
        #bracoFloat {
            position: fixed;
            bottom: 115px;
            right: 15px;
            z-index: 50;
            box-shadow: 0 6px 24px rgba(0,0,0,0.7);
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            border: 2px solid #3d2b1f;
        }
        #bracoFloat.visivel { opacity: 1; }
    </style>
</head>
<body>

    <script>
        // ============================================================
        // MINI-BRAÇO CIFRACLUB (45 linhas)
        // ============================================================
        class MiniBracoCifraClub {
            constructor() {
                this.c = document.createElement('canvas');
                this.c.width = 110;
                this.c.height = 140;
                this.x = this.c.getContext('2d');
            }

            desenhar(nome, pos) {
                const { x, c } = this;
                const w = c.width;
                const h = c.height;

                x.clearRect(0, 0, w, h);

                // Fundo madeira
                x.fillStyle = '#f5f0e8';
                x.fillRect(0, 0, w, h);

                // Cabeça do braço (marrom escuro)
                x.fillStyle = '#3d2b1f';
                x.fillRect(0, 0, w, 20);

                // Nome do acorde na cabeça
                x.fillStyle = '#fff';
                x.font = 'bold 10px sans-serif';
                x.textAlign = 'center';
                x.fillText(nome, w / 2, 14);

                // Posições das cordas
                const cordasX = [22, 37, 52, 67, 82, 97];
                const cordasNomes = ['E', 'A', 'D', 'G', 'B', 'E'];
                const trastesY = [44, 64, 84, 104, 124];
                const inicioY = 36;

                // Nomes das cordas
                x.fillStyle = '#888';
                x.font = '7px sans-serif';
                x.textAlign = 'center';
                cordasNomes.forEach((nome, i) => x.fillText(nome, cordasX[i], 32));

                // Pestana (linha grossa)
                x.strokeStyle = '#333';
                x.lineWidth = 3;
                x.beginPath();
                x.moveTo(16, inicioY);
                x.lineTo(w - 16, inicioY);
                x.stroke();

                // Trastes
                trastesY.forEach(y => {
                    x.strokeStyle = '#ccc';
                    x.lineWidth = 1;
                    x.beginPath();
                    x.moveTo(16, y);
                    x.lineTo(w - 16, y);
                    x.stroke();
                });

                // Cordas
                cordasX.forEach(cx2 => {
                    x.strokeStyle = '#c9a87c';
                    x.lineWidth = 1.5;
                    x.beginPath();
                    x.moveTo(cx2, inicioY);
                    x.lineTo(cx2, h - 8);
                    x.stroke();
                });

                // Desenhar posições do acorde
                if (pos) {
                    // Verificar pestana (barre)
                    const pestana = this._detectarPestana(pos);

                    // Ajustar offset se acorde estiver em trastes altos
                    const ativos = pos.filter(t => t > 0);
                    const trasteMin = ativos.length > 0 ? Math.min(...ativos) : 1;
                    let offset = 0;
                    if (trasteMin > 3) {
                        offset = trasteMin - 1;
                        // Mostrar número do traste inicial
                        x.fillStyle = '#333';
                        x.font = 'bold 8px sans-serif';
                        x.textAlign = 'left';
                        x.fillText(`${trasteMin}fr`, 6, trastesY[0] + 4);
                    }

                    pos.forEach((traste, i) => {
                        const cx2 = cordasX[i];

                        if (traste === -1) {
                            // Corda não toca → X vermelho
                            x.fillStyle = '#e74c3c';
                            x.font = 'bold 10px sans-serif';
                            x.textAlign = 'center';
                            x.fillText('✕', cx2, inicioY - 6);
                        } else if (traste === 0) {
                            // Corda solta → círculo vazio
                            x.strokeStyle = '#333';
                            x.lineWidth = 1.5;
                            x.beginPath();
                            x.arc(cx2, inicioY - 6, 4, 0, Math.PI * 2);
                            x.stroke();
                        } else {
                            // Traste pressionado → bolinha preta
                            const tVisual = traste - offset - 1;
                            if (tVisual >= 0 && tVisual < trastesY.length) {
                                const y = trastesY[tVisual] - 10;
                                x.fillStyle = '#333';
                                x.beginPath();
                                x.arc(cx2, y, 5, 0, Math.PI * 2);
                                x.fill();
                            }
                        }
                    });

                    // Desenhar pestana se detectada
                    if (pestana) {
                        const tVisual = pestana.traste - offset - 1;
                        if (tVisual >= 0 && tVisual < trastesY.length) {
                            const y = trastesY[tVisual] - 10;
                            const x1 = cordasX[pestana.cordas[0]];
                            const x2 = cordasX[pestana.cordas[1]];
                            x.fillStyle = '#333';
                            x.fillRect(x1 - 5, y - 3, x2 - x1 + 10, 6);
                        }
                    }
                }
            }

            _detectarPestana(pos) {
                // Detecta pestana: 3+ cordas consecutivas com mesmo traste > 0
                for (let i = 0; i < pos.length - 2; i++) {
                    if (pos[i] > 0) {
                        let count = 1;
                        for (let j = i + 1; j < pos.length; j++) {
                            if (pos[j] === pos[i]) count++;
                            else break;
                        }
                        if (count >= 3) {
                            return { traste: pos[i], cordas: [i, i + count - 1] };
                        }
                    }
                }
                return null;
            }
        }

        // ============================================================
        // VIOLAO ENGINE
        // ============================================================
        class ViolaoEngine {
            constructor() {
                this.ctx = null;
                this.buffers = {};
                this.carregados = 0;
                this.total = 36;
                this.pronto = false;
                this.onProgress = null;
                this.onReady = null;

                this.cordas = ['E6', 'A5', 'D4', 'G3', 'B2', 'E1'];

                this.cordaNotas = {
                    'E6': ['E2', 'F2', 'F#2', 'G2', 'G#2', 'A2', 'A#2', 'B2', 'C3', 'C#3', 'D3', 'D#3', 'E3'],
                    'A5': ['A2', 'A#2', 'B2', 'C3', 'C#3', 'D3', 'D#3', 'E3', 'F3', 'F#3', 'G3', 'G#3', 'A3'],
                    'D4': ['D3', 'D#3', 'E3', 'F3', 'F#3', 'G3', 'G#3', 'A3', 'A#3', 'B3', 'C4', 'C#4', 'D4'],
                    'G3': ['G3', 'G#3', 'A3', 'A#3', 'B3', 'C4', 'C#4', 'D4', 'D#4', 'E4', 'F4', 'F#4', 'G4'],
                    'B2': ['B3', 'C4', 'C#4', 'D4', 'D#4', 'E4', 'F4', 'F#4', 'G4', 'G#4', 'A4', 'A#4', 'B4'],
                    'E1': ['E4', 'F4', 'F#4', 'G4', 'G#4', 'A4', 'A#4', 'B4', 'C5', 'C#5', 'D5', 'D#5', 'E5']
                };

                this.acordes = {
                    'C': [0, 3, 2, 0, 1, 0], 'G': [3, 2, 0, 0, 0, 3], 'D': [0, 0, 0, 2, 3, 2],
                    'A': [0, 0, 2, 2, 2, 0], 'E': [0, 2, 2, 1, 0, 0], 'F': [1, 3, 3, 2, 1, 1],
                    'B': [0, 2, 4, 4, 4, 2],
                    'Am': [0, 0, 2, 2, 1, 0], 'Em': [0, 2, 2, 0, 0, 0], 'Dm': [0, 0, 0, 2, 3, 1],
                    'C7': [0, 3, 2, 3, 1, 0], 'G7': [3, 2, 0, 0, 0, 1], 'D7': [0, 0, 0, 2, 1, 2],
                    'A7': [0, 0, 2, 0, 2, 0],
                    'C7M': [0, 3, 2, 0, 0, 0], 'G7M': [3, 2, 0, 0, 0, 2],
                    'Cm': [0, 3, 5, 5, 4, 3], 'Gm': [3, 5, 5, 3, 3, 3],
                    'F#m': [2, 4, 4, 2, 2, 2], 'Bm': [0, 2, 4, 4, 3, 2],
                    'C9': [0, 3, 2, 3, 3, 3], 'G9': [3, 2, 0, 2, 0, 3], 'D9': [0, 0, 0, 2, 1, 0],
                    'A9': [0, 0, 2, 0, 2, 2],
                    'Cadd9': [0, 3, 2, 0, 3, 0], 'Gadd9': [3, 2, 0, 2, 0, 3],
                    'Csus2': [0, 3, 0, 0, 3, 0], 'Dsus2': [0, 0, 0, 2, 3, 0], 'Esus2': [0, 2, 4, 4, 0, 0],
                    'Csus4': [0, 3, 3, 0, 1, 0], 'Dsus4': [0, 0, 0, 2, 3, 3], 'Esus4': [0, 2, 2, 2, 0, 0],
                    'Cdim': [0, 3, 4, 2, 0, 0], 'Ddim': [0, 0, 0, 1, 3, 1], 'Edim': [0, 1, 2, 0, 2, 0],
                    'C_sertanejo': [0, 3, 2, 0, 1, 0], 'G_sertanejo': [3, 2, 0, 0, 0, 3],
                    'D_sertanejo': [0, 0, 0, 2, 3, 2], 'A_sertanejo': [0, 0, 2, 2, 2, 0]
                };
            }

            estaPronto() { return this.pronto; }
            resumeContext() { if (this.ctx?.state === 'suspended') this.ctx.resume(); }

            async init(arquivosPorPasta) {
                this.ctx = new(window.AudioContext || window.webkitAudioContext)();
                this.buffers = {};
                this.carregados = 0;

                const trastesParaNotas = {
                    'E6_t0': 'E2', 'E6_t3': 'G2', 'E6_t5': 'A2', 'E6_t7': 'B2', 'E6_t10': 'D3', 'E6_t12': 'E3',
                    'A5_t0': 'A2', 'A5_t3': 'C3', 'A5_t5': 'D3', 'A5_t7': 'E3', 'A5_t10': 'G3', 'A5_t12': 'A3',
                    'D4_t0': 'D3', 'D4_t2': 'E3', 'D4_t4': 'Fsharp3', 'D4_t7': 'A3', 'D4_t9': 'B3', 'D4_t12': 'D4',
                    'G3_t0': 'G3', 'G3_t2': 'A3', 'G3_t4': 'B3', 'G3_t7': 'D4', 'G3_t9': 'E4', 'G3_t12': 'G4',
                    'B2_t0': 'B3', 'B2_t1': 'C4', 'B2_t3': 'D4', 'B2_t5': 'E4', 'B2_t8': 'G4', 'B2_t12': 'B4',
                    'E1_t0': 'E4', 'E1_t1': 'F4', 'E1_t3': 'G4', 'E1_t5': 'A4', 'E1_t8': 'C5', 'E1_t12': 'E5'
                };

                const sufixosTry = ['spn', 'sfn', 'npn', 'spm'];

                for (const [trasteKey, nota] of Object.entries(trastesParaNotas)) {
                    let carregado = false;
                    for (const sufixo of sufixosTry) {
                        const nomeArquivo = `${nota}-1-${sufixo}`;
                        const pasta = arquivosPorPasta[nota];
                        if (!pasta) continue;
                        const encontrado = pasta.find(f => f.nome === nomeArquivo);
                        if (encontrado) {
                            try {
                                const arrayBuffer = await encontrado.file.arrayBuffer();
                                const audioBuffer = await this.ctx.decodeAudioData(arrayBuffer);
                                this.buffers[trasteKey] = audioBuffer;
                                this.carregados++;
                                carregado = true;
                                break;
                            } catch (e) {}
                        }
                    }
                    if (this.onProgress) this.onProgress(Math.round((this.carregados / this.total) * 100), nota);
                }

                this.pronto = this.carregados >= 20;
                if (this.onReady) this.onReady(this.pronto);
                return this.pronto;
            }

            tocarAcorde(nome, intensidade = 0.7, modo = 'batida_sertanejo', duracao = 1.5) {
                if (!this.pronto) return;
                const posicao = this.acordes[nome];
                if (!posicao) return;

                const agora = this.ctx.currentTime;
                const cordas = this.cordas;

                switch (modo) {
                    case 'batida_sertanejo':
                    case 'batida_cheia':
                        cordas.forEach((corda, i) => {
                            if (posicao[i] >= 0) this.tocarCorda(corda, posicao[i], intensidade * 0.9, agora + i * 0.005,
                                duracao);
                        });
                        break;
                    case 'dedilhado_suave':
                        [0, 1, 3, 4, 5, 4, 3].forEach((ci, idx) => {
                            if (posicao[ci] >= 0) this.tocarCorda(cordas[ci], posicao[ci], intensidade * 0.7, agora + idx *
                                0.12, 2.0);
                        });
                        break;
                    case 'fingerstyle':
                        [0, 3, 1, 4, 2, 5].forEach((ci, idx) => {
                            if (posicao[ci] >= 0) this.tocarCorda(cordas[ci], posicao[ci], intensidade * 0.75, agora + idx *
                                0.1, 1.8);
                        });
                        break;
                    case 'abafado':
                        cordas.forEach((corda, i) => {
                            if (posicao[i] >= 0) this.tocarCorda(corda, posicao[i], intensidade * 0.4, agora + i * 0.003,
                                0.12);
                        });
                        break;
                }
            }

            tocarCorda(corda, traste, intensidade, inicio, duracao) {
                const key = `${corda}_t${traste}`;
                const buffer = this.buffers[key];
                if (!buffer) return;

                const source = this.ctx.createBufferSource();
                source.buffer = buffer;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(intensidade, inicio);
                gain.gain.exponentialRampToValueAtTime(0.001, inicio + duracao);
                source.connect(gain);
                gain.connect(this.ctx.destination);
                source.start(inicio);
                source.stop(inicio + duracao + 0.05);
            }
        }

        // ============================================================
        // COMPOSITOR APP
        // ============================================================
        class CompositorApp {
            constructor() {
                this.engine = new ViolaoEngine();
                this.modo = 'batida_sertanejo';
                this.bpm = 90;
                this.compasso = 4;
                this.loop = true;
                this.tocando = false;
                this.cursorPos = 0;
                this.timer = null;
                this.grade = [];
                this.acordeSel = null;
                this.customAcordes = {};

                this.notasViolao = [];
                const todasNotas = new Set();
                this.engine.cordas.forEach(corda => {
                    this.engine.cordaNotas[corda].forEach(nota => todasNotas.add(nota));
                });
                this.notasViolao = Array.from(todasNotas).sort();

                // 🆕 Mini-braço CifraClub
                this.miniBraco = new MiniBracoCifraClub();

                this.initDOM();
                this.initEventos();
                this.configEngine();
                this.buildPiano();
                this.buildCategorias();
                this.buildEditor();
                this.setupBracoFlutuante();
                this.loadCustomAcordes();
            }

            initDOM() {
                this.statusDot = document.getElementById('statusDot');
                this.statusText = document.getElementById('statusText');
                this.pianoKeys = document.getElementById('pianoKeys');
                this.acordesGrade = document.getElementById('acordesGrade');
                this.cursorPlay = document.getElementById('cursorPlay');
                this.consoleEl = document.getElementById('console');
                this.categoriasContainer = document.getElementById('categoriasContainer');
                this.cordasEditor = document.getElementById('cordasEditor');
                this.tagsCustom = document.getElementById('tagsCustom');
                this.modalUpload = document.getElementById('modalUpload');
                this.modalProgress = document.getElementById('modalProgress');
                this.modalProgressFill = document.getElementById('modalProgressFill');
                this.modalStatus = document.getElementById('modalStatus');
                this.modalExport = document.getElementById('modalExport');
                this.cifraConteudo = document.getElementById('cifraConteudo');
                this.folderInput = document.getElementById('folderInput');
                this.bracoFloat = document.getElementById('bracoFloat');
            }

            setupBracoFlutuante() {
                this.bracoFloat.appendChild(this.miniBraco.c);
            }

            initEventos() {
                document.getElementById('btnPlay').addEventListener('click', () => this.togglePlay());
                document.getElementById('btnStop').addEventListener('click', () => this.parar());
                document.getElementById('btnLoop').addEventListener('click', function() {
                    this.classList.toggle('ativo');
                    window.app.loop = this.classList.contains('ativo');
                });
                document.getElementById('bpmInput').addEventListener('change', e => this.bpm = parseInt(e.target.value) ||
                    90);
                document.getElementById('compassoSelect').addEventListener('change', e => this.compasso = parseInt(e.target
                    .value));
                document.getElementById('modoSelect').addEventListener('change', e => this.modo = e.target.value);
                document.getElementById('btnExportar').addEventListener('click', () => this.exportarCifra());
                document.getElementById('btnCopiar').addEventListener('click', () => this.copiarProgressao());
                document.getElementById('btnSalvarProjeto').addEventListener('click', () => this.salvarProjeto());
                document.getElementById('btnCarregarProjeto').addEventListener('click', () => this.carregarProjeto());
                document.getElementById('btnUpload').addEventListener('click', () => this.modalUpload.classList.remove(
                    'hidden'));
                document.getElementById('btnLimpar').addEventListener('click', () => { this.grade = [];
                    this.renderGrade();
                    this.log('🧹 Grade limpa', 'info'); });
                document.getElementById('btnSelecionarPastas').addEventListener('click', () => this.folderInput.click());
                document.getElementById('btnFecharUpload').addEventListener('click', () => this.modalUpload.classList.add(
                    'hidden'));
                document.getElementById('btnFecharExport').addEventListener('click', () => this.modalExport.classList.add(
                    'hidden'));
                document.getElementById('btnSugerir').addEventListener('click', () => this.sugerirProximoAcorde());
                document.getElementById('btnRitmoSertanejo').addEventListener('click', () => this
                .aplicarRitmoSertanejo());
                this.folderInput.addEventListener('change', e => this.processUpload(e));

                this.modalUpload.addEventListener('click', e => { if (e.target === this.modalUpload) this.modalUpload
                        .classList.add('hidden'); });
                this.modalExport.addEventListener('click', e => { if (e.target === this.modalExport) this.modalExport
                        .classList.add('hidden'); });

                document.addEventListener('keydown', e => {
                    if (e.key === 'Escape') {
                        this.modalUpload.classList.add('hidden');
                        this.modalExport.classList.add('hidden');
                        return;
                    }
                    if (e.target.tagName === 'INPUT' && e.target.type !== 'range') return;
                    if (e.key === ' ' && !e.ctrlKey) { e.preventDefault();
                        this.togglePlay(); return; }
                    if (e.key === 'Delete' && !e.ctrlKey) { this.grade = [];
                        this.renderGrade();
                        this.log('🧹 Grade limpa', 'info'); return; }
                    if (e.ctrlKey && e.key === 'z') { e.preventDefault();
                        this.grade.pop();
                        this.renderGrade();
                        this.log('↩ Desfeito (Ctrl+Z)', 'info'); return; }
                    const teclas = { '1': 'C', '2': 'G', '3': 'D', '4': 'A', '5': 'E', '6': 'F', 'q': 'Am', 'w': 'Em',
                        'e': 'Dm', 'r': 'Cm', 't': 'G7' };
                    if (teclas[e.key] && !e.ctrlKey && !e.metaKey) {
                        this.selecionarAcorde(teclas[e.key]);
                        this.addAcordeNaGrade(teclas[e.key]);
                    }
                });
            }

            configEngine() {
                this.engine.onProgress = (pct, nota) => {
                    this.modalProgressFill.style.width = pct + '%';
                    this.modalStatus.textContent = `${pct}% - ${nota || ''}`;
                };
                this.engine.onReady = (ok) => {
                    if (ok) {
                        this.statusDot.classList.add('online');
                        this.statusText.textContent = '✅ Pronto';
                        this.modalUpload.classList.add('hidden');
                        this.log('✅ Samples carregados! Pronto para compor.', 'ok');
                    }
                };
            }

            async processUpload(e) {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                this.modalProgress.style.display = 'block';
                this.log(`📂 ${files.length} arquivos recebidos`, 'info');
                const porPasta = {};
                files.forEach(f => {
                    const partes = f.webkitRelativePath.split('/');
                    const pasta = partes[0];
                    const nome = partes[partes.length - 1].replace(/\.[^.]+$/, '');
                    if (!porPasta[pasta]) porPasta[pasta] = [];
                    porPasta[pasta].push({ nome, file: f });
                });
                await this.engine.init(porPasta);
            }

            // ============================================================
            // PIANO ROLL
            // ============================================================
            buildPiano() {
                this.pianoKeys.innerHTML = '';
                this.notasViolao.forEach(nota => {
                    const key = document.createElement('div');
                    key.className = `piano-key ${nota.includes('#')?'black':'white'}`;
                    key.textContent = nota;
                    key.dataset.nota = nota;
                    key.addEventListener('click', () => this.previewNota(nota));
                    this.pianoKeys.appendChild(key);
                });

                this.acordesGrade.innerHTML = '';
                this.notasViolao.forEach(nota => {
                    const linha = document.createElement('div');
                    linha.className = `grade-linha ${nota.includes('#')?'black':''}`;
                    linha.dataset.nota = nota;
                    this.acordesGrade.appendChild(linha);
                });

                this.cursorPlay = document.getElementById('cursorPlay');
                if (!this.acordesGrade.contains(this.cursorPlay)) {
                    this.acordesGrade.appendChild(this.cursorPlay);
                }
            }

            renderGrade() {
                this.acordesGrade.querySelectorAll('.bloco-acorde').forEach(b => b.remove());
                const PX_BATIDA = 80;

                this.grade.forEach((item, i) => {
                    const posicao = this.engine.acordes[item.acorde];
                    if (!posicao) return;

                    let notaGrave = null;
                    for (let ci = 0; ci < posicao.length; ci++) {
                        if (posicao[ci] >= 0) {
                            notaGrave = this.engine.cordaNotas[this.engine.cordas[ci]][posicao[ci]];
                            break;
                        }
                    }
                    if (!notaGrave) return;

                    const idxNota = this.notasViolao.indexOf(notaGrave);
                    if (idxNota < 0) return;

                    let y = 0;
                    for (let ni = 0; ni < idxNota; ni++) {
                        y += this.notasViolao[ni].includes('#') ? 17 : 26;
                    }

                    const x = (item.tempo / 4) * PX_BATIDA * 4;
                    const w = Math.max((item.duracao / 4) * PX_BATIDA * 4, 45);

                    const bloco = document.createElement('div');
                    bloco.className = 'bloco-acorde';
                    bloco.style.left = x + 'px';
                    bloco.style.top = y + 'px';
                    bloco.style.width = w + 'px';
                    bloco.textContent = item.acorde;
                    bloco.title = `${item.acorde} | Tempo: ${item.tempo}`;
                    bloco.dataset.index = i;
                    bloco.addEventListener('click', () => this.selecionarAcorde(item.acorde));
                    bloco.addEventListener('dblclick', () => {
                        this.grade.splice(i, 1);
                        this.renderGrade();
                    });
                    this.acordesGrade.appendChild(bloco);
                });
            }

            addAcordeNaGrade(acorde) {
                const ultimo = this.grade.length > 0 ?
                    this.grade[this.grade.length - 1].tempo + this.grade[this.grade.length - 1].duracao :
                    0;
                this.grade.push({ acorde, tempo: ultimo, duracao: this.compasso });
                this.renderGrade();
            }

            // ============================================================
            // PLAYBACK
            // ============================================================
            togglePlay() { if (this.tocando) { this.parar(); } else { this.tocar(); } }

            tocar() {
                if (!this.engine.estaPronto() || !this.grade.length) {
                    this.log('⚠️ Adicione acordes à grade!', 'warn');
                    return;
                }
                this.engine.resumeContext();
                this.tocando = true;
                document.getElementById('btnPlay').textContent = '⏸';
                this.cursorPos = 0;
                this.cursorPlay.style.display = 'block';
                this.step();
            }

            parar() {
                this.tocando = false;
                document.getElementById('btnPlay').textContent = '▶';
                this.cursorPlay.style.display = 'none';
                if (this.timer) clearTimeout(this.timer);
            }

            step() {
                if (!this.tocando) return;

                const agora = this.grade.filter(item =>
                    item.tempo <= this.cursorPos && item.tempo + item.duracao > this.cursorPos
                );

                this.acordesGrade.querySelectorAll('.bloco-acorde').forEach(b => b.classList.remove('ativo'));

                agora.forEach(item => {
                    this.engine.tocarAcorde(item.acorde, 0.7, this.modo);
                    const blocos = this.acordesGrade.querySelectorAll('.bloco-acorde');
                    blocos.forEach(b => {
                        if (b.textContent === item.acorde && parseInt(b.dataset.index) === this.grade.indexOf(
                                item)) {
                            b.classList.add('ativo');
                        }
                    });

                    const posicao = this.engine.acordes[item.acorde];
                    if (posicao) {
                        this.engine.cordas.forEach((corda, i) => {
                            if (posicao[i] >= 0) {
                                const nota = this.engine.cordaNotas[corda][posicao[i]];
                                this.highlightPianoKey(nota);
                            }
                        });
                    }
                });

                const totalTempo = this.grade.reduce((max, item) => Math.max(max, item.tempo + item.duracao), 0);
                const PX_BATIDA = 80;
                this.cursorPlay.style.left = (this.cursorPos / 4) * PX_BATIDA * 4 + 'px';
                this.cursorPos += 0.5;

                if (this.cursorPos >= totalTempo) {
                    if (this.loop) { this.cursorPos = 0; } else { this.parar(); return; }
                }

                this.timer = setTimeout(() => this.step(), (60 / this.bpm) * 500);
            }

            highlightPianoKey(nota) {
                const key = this.pianoKeys.querySelector(`[data-nota="${nota}"]`);
                if (key) {
                    key.classList.add('playing');
                    setTimeout(() => key.classList.remove('playing'), 300);
                }
            }

            // ============================================================
            // BIBLIOTECA + MINI-BRAÇO
            // ============================================================
            buildCategorias() {
                const cats = {
                    '🎵 Maiores': 'C C# D D# E F F# G G# A A# B'.split(' '),
                    '🌙 Menores': 'Cm C#m Dm D#m Em Fm F#m Gm G#m Am A#m Bm'.split(' '),
                    '7️⃣ Sétima': 'C7 D7 E7 F7 G7 A7 B7'.split(' '),
                    '✨ 7ª Maior': 'C7M D7M E7M F7M G7M A7M B7M'.split(' '),
                    '🌧️ Menor 7ª': 'Cm7 Dm7 Em7 Fm7 Gm7 Am7 Bm7'.split(' '),
                    '🎪 Suspensos': 'Csus2 Dsus2 Esus2 Csus4 Dsus4 Esus4 Gsus4 Asus4'.split(' '),
                    '💀 Diminutos': 'Cdim Ddim Edim Fdim Gdim Adim Bdim'.split(' '),
                    '🤠 Sertanejos': 'C_sertanejo G_sertanejo D_sertanejo A_sertanejo C9 D9 G9 Cadd9 Gadd9'.split(' '),
                };

                this.categoriasContainer.innerHTML = '';

                Object.entries(cats).forEach(([nome, acordes]) => {
                    const catNome = document.createElement('div');
                    catNome.className = 'cat-nome aberto';
                    catNome.textContent = nome;
                    catNome.addEventListener('click', () => catNome.classList.toggle('aberto'));

                    const grid = document.createElement('div');
                    grid.className = 'cat-grid';

                    acordes.forEach(ac => {
                        const chip = document.createElement('div');
                        chip.className = 'acorde-chip';
                        chip.textContent = ac;
                        chip.addEventListener('click', () => this.selecionarAcorde(ac));
                        chip.addEventListener('dblclick', () => this.addAcordeNaGrade(ac));
                        grid.appendChild(chip);
                    });

                    this.categoriasContainer.appendChild(catNome);
                    this.categoriasContainer.appendChild(grid);
                });
            }

            selecionarAcorde(ac) {
                this.acordeSel = ac;
                document.querySelectorAll('.acorde-chip.selecionado').forEach(c => c.classList.remove('selecionado'));
                document.querySelectorAll('.acorde-chip.sugestao').forEach(c => c.classList.remove('sugestao'));
                this.categoriasContainer.querySelectorAll('.acorde-chip').forEach(chip => {
                    if (chip.textContent === ac) chip.classList.add('selecionado');
                });

                // 🆕 Mostrar mini-braço CifraClub
                const posicao = this.engine.acordes[ac];
                if (posicao) {
                    this.miniBraco.desenhar(ac, posicao);
                    this.bracoFloat.classList.add('visivel');
                } else {
                    this.bracoFloat.classList.remove('visivel');
                }
            }

            sugerirProximoAcorde() {
                if (!this.acordeSel) { this.log('⚠️ Selecione um acorde primeiro', 'warn'); return; }
                const sugestoes = {
                    'C': ['G', 'Am', 'F', 'Dm', 'Em'],
                    'G': ['C', 'D', 'Em', 'Am', 'Bm'],
                    'D': ['G', 'A', 'Bm', 'Em', 'F#m'],
                    'A': ['D', 'E', 'F#m', 'Bm', 'C#m'],
                    'E': ['A', 'B', 'C#m', 'F#m', 'G#m'],
                    'F': ['C', 'Bb', 'Dm', 'Gm', 'Am'],
                    'Am': ['Dm', 'G', 'F', 'E7', 'C'],
                    'Em': ['Am', 'D', 'C', 'B7', 'G'],
                    'Dm': ['Gm', 'C', 'Bb', 'A7', 'F'],
                };
                const sugs = sugestoes[this.acordeSel] || Object.keys(this.engine.acordes).slice(0, 6);
                this.log(`💡 Sugestões para ${this.acordeSel}: ${sugs.join(', ')}`, 'info');
                document.querySelectorAll('.acorde-chip').forEach(chip => {
                    if (sugs.includes(chip.textContent)) chip.classList.add('sugestao');
                });
            }

            aplicarRitmoSertanejo() {
                if (!this.acordeSel) { this.log('⚠️ Selecione um acorde!', 'warn'); return; }
                const ritmo = [
                    { tempo: 0, duracao: 1.5 }, { tempo: 2, duracao: 1.5 },
                    { tempo: 4, duracao: 1 }, { tempo: 5, duracao: 1 }, { tempo: 6, duracao: 1.5 },
                ];
                const inicio = this.grade.length > 0 ?
                    this.grade[this.grade.length - 1].tempo + this.grade[this.grade.length - 1].duracao : 0;
                ritmo.forEach(r => { this.grade.push({ acorde: this.acordeSel, tempo: inicio + r.tempo, duracao: r
                        .duracao }); });
                this.renderGrade();
                this.log(`🤠 Ritmo sertanejo aplicado com ${this.acordeSel}`, 'ok');
            }

            // ============================================================
            // EDITOR CUSTOM
            // ============================================================
            buildEditor() {
                this.cordasEditor.innerHTML = '';
                const nomesCordas = ['E6 (6ª)', 'A5 (5ª)', 'D4 (4ª)', 'G3 (3ª)', 'B2 (2ª)', 'E1 (1ª)'];

                this.engine.cordas.forEach((corda, i) => {
                    const row = document.createElement('div');
                    row.className = 'corda-row';
                    const label = document.createElement('span');
                    label.textContent = nomesCordas[i];
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = -1;
                    input.max = 12;
                    input.value = 0;
                    input.dataset.idx = i;
                    const preview = document.createElement('span');
                    preview.className = 'preview';
                    preview.textContent = this.engine.cordaNotas[corda][0];

                    input.addEventListener('input', () => {
                        let v = parseInt(input.value);
                        if (isNaN(v)) v = -1;
                        if (v > 12) v = 12;
                        if (v < -1) v = -1;
                        input.value = v;
                        preview.textContent = v >= 0 ? this.engine.cordaNotas[corda][Math.min(v, 12)] : '🔇';
                    });

                    row.appendChild(label);
                    row.appendChild(input);
                    row.appendChild(preview);
                    this.cordasEditor.appendChild(row);
                });

                document.getElementById('btnTestarCustom').addEventListener('click', () => {
                    const pos = this.getCustomPos();
                    const nomeTemp = '__t_' + Date.now();
                    this.engine.acordes[nomeTemp] = pos;
                    this.engine.tocarAcorde(nomeTemp, 0.7, this.modo);
                    setTimeout(() => delete this.engine.acordes[nomeTemp], 3000);
                });

                document.getElementById('btnSalvarCustom').addEventListener('click', () => this.saveCustom());
            }

            getCustomPos() {
                const inputs = this.cordasEditor.querySelectorAll('input');
                return Array.from(inputs).map(inp => parseInt(inp.value));
            }

            saveCustom() {
                const nome = document.getElementById('inputNomeCustom').value.trim();
                if (!nome) return this.log('⚠️ Dê um nome!', 'warn');
                const pos = this.getCustomPos();
                this.customAcordes[nome] = pos;
                this.engine.acordes[nome] = pos;
                localStorage.setItem('violao_custom_acordes', JSON.stringify(this.customAcordes));
                this.renderTags();
                this.log(`✅ Acorde "${nome}" salvo!`, 'ok');
            }

            loadCustomAcordes() {
                try {
                    const d = localStorage.getItem('violao_custom_acordes');
                    if (d) {
                        this.customAcordes = JSON.parse(d);
                        Object.entries(this.customAcordes).forEach(([n, p]) => this.engine.acordes[n] = p);
                    }
                } catch (e) { this.customAcordes = {}; }
                this.renderTags();
            }

            renderTags() {
                const nomes = Object.keys(this.customAcordes);
                this.tagsCustom.innerHTML = nomes.length ?
                    nomes.map(n =>
                        `<span class="acorde-chip custom" onclick="window.app.selecionarAcorde('${n}')">${n}</span>`)
                    .join('') :
                    '<span style="font-size:9px;color:var(--text2);">Nenhum salvo</span>';
            }

            // ============================================================
            // EXPORTAÇÃO
            // ============================================================
            exportarCifra() {
                if (!this.grade.length) return this.log('⚠️ Grade vazia!', 'warn');
                let txt = `🎸 Violão Compositor Sertanejo\n`;
                txt += `Data: ${new Date().toLocaleDateString()}\n`;
                txt += `BPM: ${this.bpm} | Compasso: ${this.compasso}/4\n`;
                txt += '='.repeat(45) + '\n\n';
                const porCompasso = [];
                for (let i = 0; i < this.grade.length; i += this.compasso) {
                    porCompasso.push(this.grade.slice(i, i + this.compasso));
                }
                porCompasso.forEach(comp => {
                    txt += '| ' + comp.map(c => c.acorde.padEnd(6)).join('| ') + '|\n';
                });
                txt += '\n' + '='.repeat(45) + '\n';
                txt += `Total: ${this.grade.length} acordes em ${porCompasso.length} compassos\n`;

                const blob = new Blob([txt], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `progressao_${Date.now()}.txt`;
                a.click();
                URL.revokeObjectURL(url);

                this.cifraConteudo.textContent = txt;
                this.modalExport.classList.remove('hidden');
                this.log('📝 Cifra exportada e baixada!', 'ok');
            }

            copiarProgressao() {
                if (!this.grade.length) return this.log('⚠️ Grade vazia!', 'warn');
                const txt = this.grade.map(item => item.acorde).join(' ');
                navigator.clipboard.writeText(txt).then(() => {
                    this.log('📋 Progressão copiada!', 'ok');
                }).catch(() => {
                    this.log('❌ Erro ao copiar', 'erro');
                });
            }

            salvarProjeto() {
                const nome = prompt('Nome do projeto:');
                if (!nome) return;
                const projetos = JSON.parse(localStorage.getItem('violao_projetos') || '{}');
                projetos[nome] = { grade: this.grade, bpm: this.bpm, compasso: this.compasso, modo: this.modo };
                localStorage.setItem('violao_projetos', JSON.stringify(projetos));
                this.log(`💾 Projeto "${nome}" salvo!`, 'ok');
            }

            carregarProjeto() {
                const projetos = JSON.parse(localStorage.getItem('violao_projetos') || '{}');
                const nomes = Object.keys(projetos);
                if (!nomes.length) return this.log('⚠️ Nenhum projeto salvo', 'warn');
                const nome = prompt('Projetos salvos:\n\n' + nomes.join('\n') + '\n\nDigite o nome:');
                if (!nome || !projetos[nome]) return;
                const p = projetos[nome];
                this.grade = p.grade;
                this.bpm = p.bpm || 90;
                this.compasso = p.compasso || 4;
                this.modo = p.modo || 'batida_sertanejo';
                document.getElementById('bpmInput').value = this.bpm;
                document.getElementById('compassoSelect').value = this.compasso;
                document.getElementById('modoSelect').value = this.modo;
                this.renderGrade();
                this.log(`📂 Projeto "${nome}" carregado!`, 'ok');
            }

            // ============================================================
            // UTILITÁRIOS
            // ============================================================
            previewNota(nota) {
                if (!this.engine.estaPronto()) return;
                this.engine.resumeContext();
                for (const [corda, notas] of Object.entries(this.engine.cordaNotas)) {
                    const idx = notas.indexOf(nota);
                    if (idx >= 0) {
                        this.engine.tocarCorda(corda, idx, 0.6, this.engine.ctx.currentTime, 1.2);
                        this.highlightPianoKey(nota);
                        break;
                    }
                }
            }

            log(msg, tipo = 'info') {
                const time = new Date().toLocaleTimeString();
                this.consoleEl.innerHTML += `\n<span class="${tipo}">[${time}] ${msg}</span>`;
                this.consoleEl.scrollTop = this.consoleEl.scrollHeight;
                const linhas = this.consoleEl.innerHTML.split('\n');
                if (linhas.length > 80) {
                    this.consoleEl.innerHTML = linhas.slice(linhas.length - 80).join('\n');
                }
            }
        }

        // ============================================================
        // INICIALIZAR
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            window.app = new CompositorApp();
            window.app.log('🎸 Violão Compositor Sertanejo Pro v2.2.0', 'ok');
            window.app.log('🆕 Mini-braço CifraClub integrado!', 'ok');
            window.app.log('📂 Clique "Samples" para carregar o dataset', 'info');
            window.app.log('💡 Clique nos acordes | Duplo-clique add à grade', 'info');
            window.app.log('⌨️ Espaço=Play | 1-6,Q-T=Acordes | Del=Limpar | Ctrl+Z=Desfazer', 'info');
        });
    </script>
</body>
</html>
